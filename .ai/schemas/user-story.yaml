# JSON Schema for User Stories
$schema: "https://json-schema.org/draft-07/schema#"
type: object
required:
  - story
properties:
  story:
    type: object
    required:
      - id
      - title
      - description
      - acceptance_criteria
    properties:
      id:
        type: string
        pattern: "^ST-\\d+$"
      title:
        type: string
        minLength: 10
        maxLength: 100
      description:
        type: string
        pattern: "^As a .+, I want to .+ so that .+\\.$"
      acceptance_criteria:
        type: array
        minItems: 1
        items:
          type: object
          required:
            - scenario
          properties:
            scenario:
              type: string
            given:
              type: string
            when:
              type: string
            then:
              type: string
      business_rules:
        type: array
        items:
          type: string
          pattern: "^BR-\\d+$"
      dependencies:
        type: array
        items:
          type: string
          pattern: "^ST-\\d+$"
      estimate:
        type: object
        properties:
          points:
            type: integer
            enum: [1, 2, 3, 5, 8, 13, 21]
          tshirt:
            type: string
            enum: ["XS", "S", "M", "L", "XL", "XXL"]
      labels:
        type: array
        items:
          type: string
      linked_prd:
        type: string
        pattern: "^PRD-\\d{4}-\\d+$"
