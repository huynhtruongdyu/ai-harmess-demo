# JSON Schema for Workflow Definitions
$schema: "https://json-schema.org/draft-07/schema#"
type: object
required:
  - name
  - description
  - trigger
  - steps
properties:
  name:
    type: string
    pattern: "^[a-z0-9-]+$"
  description:
    type: string
  version:
    type: string
    pattern: "^\\d+\\.\\d+\\.\\d+$"
  trigger:
    type: object
    required:
      - event
    properties:
      event:
        type: string
      artifact:
        type: string
  steps:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - id
        - agent
        - action
      properties:
        id:
          type: string
        agent:
          type: string
        action:
          type: string
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        output:
          type: string
        prompt_template:
          type: string
        template:
          type: string
        target_agents:
          type: array
          items:
            type: string
        parallel:
          type: boolean
        constraints:
          type: array
          items:
            type: string
        gate:
          type: object
          properties:
            requires_approval:
              type: boolean
            approval_criteria:
              type: array
              items:
                type: string
        environment:
          type: string
        strategy:
          type: string
        canary:
          type: object
        timeout_minutes:
          type: integer
  error_handling:
    type: array
    items:
      type: object
      properties:
        if:
          type: string
        action:
          type: string
        to:
          type: string
        message:
          type: string
