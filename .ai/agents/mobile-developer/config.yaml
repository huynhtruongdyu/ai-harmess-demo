agent:
  name: "mobile-developer"
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 3500

memory_access:
  - "project-context"
  - "architecture-decisions"
  - "coding-standards"
  - "current-sprint"

memory_write:
  - null

tools:
  - "read-file"
  - "write-file"
  - "edit-file"
  - "list-directory"
  - "regex-search"
  - "git-commit"
  - "create-pr"
  - "run-tests"

timeout_minutes: 45
review_required: true
