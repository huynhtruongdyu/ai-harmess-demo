agent:
  name: "product-manager"
  model: "gpt-4o"
  temperature: 0.6
  max_tokens: 3000

memory_access:
  - "project-context"
  - "business-rules"
  - "glossary"
  - "current-sprint"
  - "completed-tasks"
  - "open-issues"

memory_write:
  - "current-sprint"
  - "architecture-decisions"

tools:
  - "read-file"
  - "write-file"
  - "edit-file"
  - "list-directory"
  - "llm-call"
  - "regex-search"

notification_channels:
  - type: "slack"
    channel: "#product"

timeout_minutes: 20
review_required: false
