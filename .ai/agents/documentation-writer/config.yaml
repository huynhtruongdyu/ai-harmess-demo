agent:
  name: "documentation-writer"
  model: "gpt-4o"
  temperature: 0.5
  max_tokens: 3000

memory_access:
  - "project-context"
  - "architecture-decisions"
  - "coding-standards"
  - "current-sprint"
  - "completed-tasks"

memory_write:
  - "project-context"

tools:
  - "read-file"
  - "write-file"
  - "edit-file"
  - "list-directory"
  - "regex-search"

timeout_minutes: 20
review_required: false
