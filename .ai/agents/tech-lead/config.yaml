agent:
  name: "tech-lead"
  model: "gpt-4o"
  temperature: 0.5
  max_tokens: 2500

memory_access:
  - "project-context"
  - "architecture-decisions"
  - "coding-standards"
  - "current-sprint"
  - "open-issues"
  - "completed-tasks"

memory_write:
  - "current-sprint"
  - "open-issues"
  - "completed-tasks"

tools:
  - "read-file"
  - "write-file"
  - "edit-file"
  - "list-directory"
  - "regex-search"
  - "llm-call"

timeout_minutes: 20
review_required: false
